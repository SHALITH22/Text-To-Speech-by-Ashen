<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Free, private text-to-speech that runs entirely in your browser. No sign-up, no servers, no downloads." />
  <title>TTS — Free Text to Speech</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔊</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1 class="app__title">🔊 TTS</h1>
      <p class="app__subtitle">Free text-to-speech. Runs 100% in your browser — nothing is uploaded.</p>
    </header>

    <section class="card">
      <label class="field">
        <span class="field__label">Text to speak</span>
        <textarea id="text" class="field__input" rows="7" placeholder="Type or paste your text here…">Fear less, do more, and take bold steps.</textarea>
        <span id="charCount" class="field__hint">0 characters</span>
      </label>

      <div class="grid">
        <label class="field">
          <span class="field__label">Voice</span>
          <select id="voice" class="field__input"></select>
        </label>

        <label class="field">
          <span class="field__label">Speed — <output id="rateVal">1.0</output>×</span>
          <input id="rate" class="slider" type="range" min="0.5" max="2" step="0.1" value="1" />
        </label>

        <label class="field">
          <span class="field__label">Pitch — <output id="pitchVal">1.0</output></span>
          <input id="pitch" class="slider" type="range" min="0" max="2" step="0.1" value="1" />
        </label>

        <label class="field">
          <span class="field__label">Volume — <output id="volumeVal">100</output>%</span>
          <input id="volume" class="slider" type="range" min="0" max="1" step="0.05" value="1" />
        </label>
      </div>

      <div class="controls">
        <button id="speak" class="btn btn--primary" type="button">▶ Speak</button>
        <button id="pause" class="btn" type="button" disabled>⏸ Pause</button>
        <button id="resume" class="btn" type="button" disabled>⏵ Resume</button>
        <button id="stop" class="btn" type="button" disabled>⏹ Stop</button>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </section>

    <footer class="app__footer">
      <span>Powered by the browser <strong>Web Speech API</strong> · No data leaves your device</span>
      <a href="https://github.com/" target="_blank" rel="noopener">View source on GitHub</a>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
