<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Free text-to-speech in your browser. Instant browser voices, or neural Kokoro voices with downloadable audio. No servers, no sign-up." />
  <title>Text To Speech by Ashen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔊</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1 class="app__title">🔊 Text To Speech <span class="app__by">by Ashen</span></h1>
      <p class="app__subtitle">Free text-to-speech. Runs 100% in your browser — nothing is uploaded.</p>
    </header>

    <section class="card">
      <!-- Engine selector -->
      <div class="segmented" role="tablist" aria-label="Engine">
        <button id="engInstant" class="segmented__btn is-active" role="tab" type="button">
          ⚡ Instant
          <small>browser voices · no download</small>
        </button>
        <button id="engStudio" class="segmented__btn" role="tab" type="button">
          🎙️ Studio
          <small>neural · downloadable audio</small>
        </button>
      </div>

      <label class="field">
        <span class="field__label">Text to speak</span>
        <textarea id="text" class="field__input" rows="6" placeholder="Type or paste your text here…">Fear less, do more, and take bold steps.</textarea>
        <span id="charCount" class="field__hint">0 characters</span>
      </label>

      <div class="grid">
        <label class="field">
          <span class="field__label">Voice</span>
          <select id="voice" class="field__input"></select>
        </label>

        <label class="field" id="qualityField" hidden>
          <span class="field__label">Quality
            <span class="info" title="Fast = ~80 MB download, quick. Best = ~326 MB, highest fidelity. Downloaded once, then cached.">ⓘ</span>
          </span>
          <select id="quality" class="field__input">
            <option value="q8" selected>Fast — q8 (~80 MB)</option>
            <option value="fp32">Best — fp32 (~326 MB)</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Speed — <output id="rateVal">1.0</output>×</span>
          <input id="rate" class="slider" type="range" min="0.5" max="2" step="0.1" value="1" />
        </label>

        <label class="field" id="pitchField">
          <span class="field__label">Pitch — <output id="pitchVal">1.0</output></span>
          <input id="pitch" class="slider" type="range" min="0" max="2" step="0.1" value="1" />
        </label>

        <label class="field">
          <span class="field__label">Volume — <output id="volumeVal">100</output>%</span>
          <input id="volume" class="slider" type="range" min="0" max="1" step="0.05" value="1" />
        </label>
      </div>

      <div class="controls">
        <button id="speak" class="btn btn--primary" type="button">▶ Speak</button>
        <button id="pause" class="btn" type="button" disabled>⏸ Pause</button>
        <button id="resume" class="btn" type="button" disabled>⏵ Resume</button>
        <button id="stop" class="btn" type="button" disabled>⏹ Stop</button>
        <button id="download" class="btn btn--accent" type="button" disabled title="Available in Studio mode after generating">⬇ Download WAV</button>
      </div>

      <div id="progressWrap" class="progress" hidden>
        <div id="progressBar" class="progress__bar"></div>
      </div>

      <audio id="player" class="player" controls hidden></audio>

      <p id="status" class="status" role="status" aria-live="polite">Ready.</p>
    </section>

    <footer class="app__footer">
      <span>⚡ Instant = browser <strong>Web Speech API</strong> · 🎙️ Studio = <strong>Kokoro-82M</strong> neural (runs locally) · No data leaves your device</span>
      <a href="https://github.com/SHALITH22/tts" target="_blank" rel="noopener">View source on GitHub</a>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
